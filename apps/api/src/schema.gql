  myReviews(limit: Int = 10, offset: Int = 0): [Review!]!

  """Get occupancy analytics for a hotel"""
  occupancyAnalytics(hotelId: ID!, period: String = "30d"): OccupancyAnalytics!

  """Get occupancy forecast for the next N days"""
  occupancyForecast(input: OccupancyForecastInput!): [OccupancyForecastDay!]!

  """Get all payments for a booking"""
  paymentsByBooking(bookingId: ID!): [Payment!]!

  """Get popular cities"""
  popularCities(limit: Float = 10): [PopularCity!]!

  """Get AI-powered pricing suggestions for a room type"""
  priceSuggestions(input: PriceSuggestionsInput!): PricingAnalysisGQL!

  """Get revenue analytics for a hotel"""
  revenueAnalytics(hotelId: ID!, period: String = "30d"): RevenueAnalytics!

  """Get room type by ID"""
  roomType(id: ID!): RoomType!

  """Get room types for a hotel"""
  roomTypes(filters: RoomTypeFiltersInput, hotelId: ID!): [RoomType!]!

  """Quick search hotels"""
  searchHotels(limit: Float = 10, query: String!): [Hotel!]!

  """Get setup wizard status for the hotel"""
  setupStatus(hotelId: ID!): SetupStatus!

  """Get current user profile"""
  userProfile: User!
}

