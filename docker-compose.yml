# Hotel Manager - Docker Compose for Local Development
# Usage: docker-compose up -d
# Lite mode (no Redis): docker-compose up postgres api web mailpit

version: '3.9'

services:
  # ============================================
  # DATABASE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: hotel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotel_secret
      POSTGRES_DB: hotel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # CACHE (Optional — app works without it)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: hotel-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass hotel_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "hotel_redis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - full

  # ============================================
  # API (NestJS)
  # ============================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: hotel-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://hotel:hotel_secret@postgres:5432/hotel
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: hotel_redis
      REDIS_ENABLED: "false"
      HOTEL_ID: ${HOTEL_ID:-}
      APP_NAME: ${APP_NAME:-My Hotel}
      JWT_SECRET: dev_jwt_secret_change_in_production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGINS: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: "${APP_NAME:-My Hotel} <noreply@localhost>"
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/app/apps/api:cached
      - ./packages:/app/packages:cached
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev:api

  # ============================================
  # WEB (Next.js)
  # ============================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: hotel-web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000/graphql
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      API_URL: http://api:4000/graphql
      HOTEL_ID: ${HOTEL_ID:-}
      APP_NAME: ${APP_NAME:-My Hotel}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web:cached
      - ./packages:/app/packages:cached
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - api
    command: npm run dev:web

  # ============================================
  # MAIL CATCHER (Dev only — catches all outgoing email)
  # Web UI: http://localhost:8025
  # ============================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: hotel-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # ============================================
  # DATABASE ADMIN (Optional)
  # ============================================
  adminer:
    image: adminer:latest
    container_name: hotel-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: hotel-network
